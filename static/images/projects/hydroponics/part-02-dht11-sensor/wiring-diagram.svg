<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<style>
  .t  { font-family: sans-serif; font-size: 14px; fill: #3d3d3a; }
  .ts { font-family: sans-serif; font-size: 12px; fill: #6b6b65; }
  .th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #3d3d3a; }
  @media (prefers-color-scheme: dark) {
    .t  { fill: #c2c0b6; }
    .ts { fill: #9c9a92; }
    .th { fill: #c2c0b6; }
  }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ARDUINO UNO -->
<rect x="30" y="60" width="200" height="380" rx="10" fill="#1A6E3C" stroke="#0f4526" stroke-width="1.5"/>
<rect x="30" y="80" width="18" height="32" rx="3" fill="#888" stroke="#555" stroke-width="1"/>
<text class="th" x="130" y="95" text-anchor="middle" fill="#7ecfa0" font-size="13">Arduino Uno</text>
<text class="ts" x="200" y="125" text-anchor="end" fill="#9ad4b5" font-size="11">Digital pins</text>
<rect x="198" y="130" width="28" height="18" rx="3" fill="#1D9E75" stroke="#0F6E56" stroke-width="1"/>
<text class="ts" x="212" y="143" text-anchor="middle" fill="#E1F5EE" font-size="10">2</text>
<rect x="198" y="152" width="28" height="14" rx="3" fill="#2d8f55" stroke="#1f6b3e" stroke-width="0.5"/>
<text class="ts" x="212" y="162" text-anchor="middle" fill="#9ad4b5" font-size="9">3</text>
<rect x="198" y="170" width="28" height="14" rx="3" fill="#2d8f55" stroke="#1f6b3e" stroke-width="0.5"/>
<text class="ts" x="212" y="180" text-anchor="middle" fill="#9ad4b5" font-size="9">4</text>
<rect x="198" y="188" width="28" height="14" rx="3" fill="#2d8f55" stroke="#1f6b3e" stroke-width="0.5"/>
<text class="ts" x="212" y="198" text-anchor="middle" fill="#9ad4b5" font-size="9">5</text>
<text class="ts" x="200" y="255" text-anchor="end" fill="#9ad4b5" font-size="11">Power pins</text>
<rect x="198" y="260" width="28" height="18" rx="3" fill="#444" stroke="#222" stroke-width="1"/>
<text class="ts" x="212" y="272" text-anchor="middle" fill="#eee" font-size="10">GND</text>
<rect x="198" y="282" width="28" height="18" rx="3" fill="#cc2222" stroke="#991111" stroke-width="1"/>
<text class="ts" x="212" y="295" text-anchor="middle" fill="#fff" font-size="10">5V</text>
<rect x="198" y="304" width="28" height="14" rx="3" fill="#2d8f55" stroke="#1f6b3e" stroke-width="0.5"/>
<text class="ts" x="212" y="314" text-anchor="middle" fill="#9ad4b5" font-size="9">3.3V</text>
<rect x="12" y="88" width="18" height="16" rx="2" fill="#555" stroke="#333" stroke-width="0.5"/>
<text class="ts" x="21" y="130" text-anchor="middle" fill="#9ad4b5" font-size="9" transform="rotate(-90,21,130)">USB</text>

<!-- KY-015 DHT11 MODULE -->
<rect x="370" y="160" width="110" height="140" rx="6" fill="#1a3a6e" stroke="#0f2548" stroke-width="1.5"/>
<text class="th" x="425" y="185" text-anchor="middle" fill="#7aabdf" font-size="11">KY-015</text>
<text class="ts" x="425" y="200" text-anchor="middle" fill="#5a8bbf" font-size="9">DHT11</text>
<rect x="393" y="208" width="64" height="52" rx="4" fill="#e8e0cc" stroke="#b0a888" stroke-width="1"/>
<text class="ts" x="425" y="230" text-anchor="middle" fill="#555" font-size="9">DHT11</text>
<text class="ts" x="425" y="244" text-anchor="middle" fill="#888" font-size="8">sensor</text>
<rect x="388" y="272" width="22" height="22" rx="3" fill="#1D9E75" stroke="#0F6E56" stroke-width="1"/>
<text class="ts" x="399" y="287" text-anchor="middle" fill="#E1F5EE" font-size="10">S</text>
<rect x="414" y="272" width="22" height="22" rx="3" fill="#cc2222" stroke="#991111" stroke-width="1"/>
<text class="ts" x="425" y="287" text-anchor="middle" fill="#fff" font-size="10">+</text>
<rect x="440" y="272" width="22" height="22" rx="3" fill="#444" stroke="#222" stroke-width="1"/>
<text class="ts" x="451" y="287" text-anchor="middle" fill="#eee" font-size="10">−</text>
<line x1="399" y1="294" x2="399" y2="310" stroke="#aaa" stroke-width="2"/>
<line x1="425" y1="294" x2="425" y2="310" stroke="#aaa" stroke-width="2"/>
<line x1="451" y1="294" x2="451" y2="310" stroke="#aaa" stroke-width="2"/>

<!-- WIRES -->
<path d="M226 139 L300 139 L300 320 L399 320 L399 310" fill="none" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="226" cy="139" r="4" fill="#1D9E75"/>
<circle cx="399" cy="310" r="4" fill="#1D9E75"/>
<path d="M226 291 L300 291 L300 335 L425 335 L425 310" fill="none" stroke="#cc2222" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="226" cy="291" r="4" fill="#cc2222"/>
<circle cx="425" cy="310" r="4" fill="#cc2222"/>
<path d="M226 269 L310 269 L310 350 L451 350 L451 310" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="226" cy="269" r="4" fill="#333"/>
<circle cx="451" cy="310" r="4" fill="#333"/>

<!-- CALLOUT -->
<line x1="226" y1="139" x2="226" y2="50" stroke="#aaa" stroke-width="0.5" stroke-dasharray="4 3"/>
<rect x="168" y="32" width="116" height="20" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="226" y="46" text-anchor="middle" fill="#0F6E56" font-size="11">Pin 2 (data signal)</text>
<text class="ts" x="534" y="218" fill="#1D9E75" font-size="11">S — data</text>
<text class="ts" x="534" y="238" fill="#cc2222" font-size="11">+ — 5V</text>
<text class="ts" x="534" y="258" fill="#555" font-size="11">− — GND</text>

<!-- LEGEND -->
<rect x="30" y="460" width="340" height="44" rx="6" fill="#f5f5f0" stroke="#ccc" stroke-width="0.5"/>
<line x1="48" y1="476" x2="80" y2="476" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<text class="ts" x="88" y="480" fill="#555" font-size="11">Pin 2 → S (data signal)</text>
<line x1="48" y1="494" x2="80" y2="494" stroke="#cc2222" stroke-width="2.5" stroke-linecap="round"/>
<text class="ts" x="88" y="498" fill="#555" font-size="11">5V → + (power)</text>
<line x1="200" y1="494" x2="232" y2="494" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
<text class="ts" x="240" y="498" fill="#555" font-size="11">GND → − (ground)</text>
</svg>
